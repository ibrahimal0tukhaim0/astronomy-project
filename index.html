<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Astronomy App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@300;400;600;700;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <!-- GLOBAL ERROR HANDLER FOR DEBUGGING -->
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      const root = document.getElementById('root');
      root.innerHTML = `
        <div style="background:black; color:red; padding:20px; font-family:monospace; height:100vh; overflow:auto;">
          <h2>CRITICAL ERROR</h2>
          <p><strong>Message:</strong> ${message}</p>
          <p><strong>Source:</strong> ${source}:${lineno}:${colno}</p>
          <pre>${error ? error.stack : 'No stack trace'}</pre>
        </div>
      `;
    };
    window.onunhandledrejection = function (event) {
      const root = document.getElementById('root');
      root.innerHTML += `
        <div style="background:black; color:orange; padding:20px; font-family:monospace;">
           <h2>UNHANDLED PROMISE REJECTION</h2>
           <p>${event.reason}</p>
        </div>
      `;
    };
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
